<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Currículum Vitae</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { text-align: center; }
    .section { margin-bottom: 20px; }

    /* Ocultar botones al imprimir o guardar en PDF */
    @media print {
      .no-print {
        display: none;
      }
    }
  </style>
</head>
<body>
  <h1>Felipe de Jesús Jiménez Martínez</h1>
  <div class="section">
    <h2>Experiencia</h2>
    <p>Coofundador & Socio Corporativo en LuzNet Digital Solutions</p>
  </div>
  <div class="section">
    <h2>Educación</h2>
    <p>Ingeniería en Sistemas</p>
  </div>

  <!-- Botón que NO aparecerá en el PDF -->
  <button class="no-print" onclick="downloadPDF()">Descargar en PDF</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script>
    function downloadPDF() {
      const element = document.body;
      html2pdf().from(element).save("CV_Felipe.pdf");
    }
  </script>
</body>
</html>
